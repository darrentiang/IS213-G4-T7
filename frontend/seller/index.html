<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidBoard — Seller Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/shared/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Seller navbar -->
    <nav class="navbar">
        <div class="container navbar-grid">
            <span class="navbar-text">Seller: <span id="navbar-user-name">Loading...</span></span>
            <a href="/seller/" class="navbar-brand"><i data-lucide="zap"></i> BidBoard</a>
            <div></div>
        </div>
    </nav>

    <div class="container" style="margin-top: 2.5rem;">
        <div class="page-header">
            <h2><i data-lucide="layout-grid"></i> My Listings</h2>
            <a href="/seller/create-listing.html" class="btn-action"><i data-lucide="plus"></i> Create Listing</a>
        </div>

        <!-- Filter buttons -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="AUCTION">Auctions</button>
            <button class="filter-tab" data-filter="FIXED">Fixed</button>
        </div>

        <!-- Skeleton loader -->
        <div id="loading" class="row g-4">
            <div class="col-md-4 col-sm-6"><div class="skeleton-card"><div class="skeleton-img"></div><div style="padding: 1rem 1.1rem;"><div class="skeleton-line w-40"></div><div class="skeleton-line w-80"></div><div class="skeleton-line w-60"></div></div></div></div>
            <div class="col-md-4 col-sm-6"><div class="skeleton-card"><div class="skeleton-img"></div><div style="padding: 1rem 1.1rem;"><div class="skeleton-line w-40"></div><div class="skeleton-line w-80"></div><div class="skeleton-line w-60"></div></div></div></div>
            <div class="col-md-4 col-sm-6"><div class="skeleton-card"><div class="skeleton-img"></div><div style="padding: 1rem 1.1rem;"><div class="skeleton-line w-40"></div><div class="skeleton-line w-80"></div><div class="skeleton-line w-60"></div></div></div></div>
        </div>

        <!-- Empty state -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-icon"><i data-lucide="package"></i></div>
            <p>You don't have any listings yet.</p>
            <a href="/seller/create-listing.html" class="btn btn-dark"><i data-lucide="plus"></i> Create Your First Listing</a>
        </div>

        <!-- Listing cards grid -->
        <div id="listings-grid" class="row g-4" style="display: none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/js/config.js"></script>
    <script src="/shared/js/api.js"></script>
    <script>
        loadNavbarUser(CONFIG.SELLER_ID);

        let allListings = [];
        let currentFilter = "all";

        // Filter tab clicks
        document.querySelectorAll(".filter-tab").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-tab").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = btn.dataset.filter;
                renderListings();
            });
        });

        async function loadListings() {
            try {
                const result = await apiFetch(`${CONFIG.LISTING_API}/listings`);
                const listings = result.listings || [];

                // Filter to only this seller's listings
                allListings = listings.filter(l => l.sellerId === CONFIG.SELLER_ID);

                document.getElementById("loading").style.display = "none";
                renderListings();

            } catch (err) {
                document.getElementById("loading").style.display = "none";
                document.getElementById("empty-state").style.display = "block";
            }
        }

        function renderListings() {
            const grid = document.getElementById("listings-grid");
            const emptyState = document.getElementById("empty-state");

            const filtered = (currentFilter === "all"
                ? allListings
                : allListings.filter(l => l.listingType === currentFilter))
                .sort((a, b) => b.listingId - a.listingId);

            emptyState.style.display = "none";
            grid.style.display = "none";
            grid.innerHTML = "";

            if (filtered.length === 0) {
                emptyState.style.display = "block";
                return;
            }

            grid.style.display = "flex";
            grid.innerHTML = filtered.map(listing => createListingCard(listing)).join("");

            // If any listing has a stale status (should have transitioned), retry
            const needsRefresh = allListings.some(l => {
                if (l.listingType !== "AUCTION" || !l.startTime || !l.endTime) return false;
                const s = parseUtcDate(l.startTime), e = parseUtcDate(l.endTime), now = new Date();
                return (l.status === "SCHEDULED" && s <= now) || (l.status === "ACTIVE" && e <= now);
            });
            if (needsRefresh) setTimeout(() => loadListings(), 5000);
        }

        function createListingCard(listing) {
            const typeBadge = listing.listingType === "AUCTION"
                ? `<span class="badge badge-auction">AUCTION</span>`
                : `<span class="badge badge-fixed">FIXED</span>`;

            const statusBadge = `<span class="badge ${statusBadgeClass(listing.status)}">${statusLabel(listing.status)}</span>`;

            const imageInner = listing.imageUrl
                ? `<img src="${listing.imageUrl}" class="card-img-top" alt="${listing.title}" onerror="this.outerHTML='<div class=\\'img-placeholder\\'>No Image</div>'">`
                : `<div class="img-placeholder">No Image</div>`;

            // Countdown overlay for auctions
            let countdownHtml = "";
            if (listing.listingType === "AUCTION" && listing.startTime && listing.endTime) {
                const now = new Date();
                const start = parseUtcDate(listing.startTime);
                const end = parseUtcDate(listing.endTime);

                if (listing.status === "SCHEDULED" && start > now) {
                    const text = formatCountdown(start - now);
                    countdownHtml = `<div class="countdown-overlay countdown-scheduled" data-target="${start.toISOString()}" data-type="start">Starts in ${text}</div>`;
                } else if (listing.status === "SCHEDULED" && start <= now) {
                    countdownHtml = `<div class="countdown-overlay countdown-scheduled">Starting soon...</div>`;
                } else if (listing.status === "ACTIVE" && end > now) {
                    const remaining = end - now;
                    const cls = remaining < 60000 ? "countdown-ending" : "countdown-active";
                    const text = formatCountdown(remaining);
                    countdownHtml = `<div class="countdown-overlay ${cls}" data-target="${end.toISOString()}" data-type="end">Ends in ${text}</div>`;
                } else if (listing.status === "ACTIVE" && end <= now) {
                    countdownHtml = `<div class="countdown-overlay countdown-ended">Auction Ended</div>`;
                } else if (["CLOSED_PENDING_PAYMENT", "SOLD", "FAILED_NO_ELIGIBLE_BIDDER"].includes(listing.status)) {
                    countdownHtml = `<div class="countdown-overlay countdown-ended">Auction Ended</div>`;
                }
            }

            // Price label
            let priceLabel;
            if (listing.status === "SOLD" && listing.winningPrice) {
                priceLabel = `<span class="price-label">Sold for </span>${formatPrice(listing.winningPrice)}`;
            } else if (listing.listingType === "AUCTION") {
                priceLabel = `<span class="price-label">Starting at </span>${formatPrice(listing.startPrice)}`;
            } else {
                priceLabel = formatPrice(listing.startPrice);
            }

            return `
                <div class="col-md-4 col-sm-6">
                    <div class="card listing-card h-100" onclick="window.location.href='/seller/listing-detail.html?id=${listing.listingId}'">
                        <div class="card-image-wrapper">
                            ${imageInner}
                            ${countdownHtml}
                        </div>
                        <div class="card-body d-flex flex-column">
                            <div class="d-flex justify-content-between mb-2">${typeBadge} ${statusBadge}</div>
                            <h5 class="card-title">${listing.title}</h5>
                            <p class="card-text price-tag${listing.status === 'SOLD' ? ' price-sold' : ''}">${priceLabel}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        async function deleteListing(listingId) {
            if (!confirm("Are you sure you want to delete this listing? This cannot be undone.")) return;
            try {
                await Promise.allSettled([
                    apiFetch(`${CONFIG.BID_API}/bids/listing/${listingId}`, { method: "DELETE" }),
                    apiFetch(`${CONFIG.OFFER_API}/offers/listing/${listingId}`, { method: "DELETE" })
                ]);
                await apiFetch(`${CONFIG.LISTING_API}/listings/${listingId}`, { method: "DELETE" });
                loadListings();
            } catch (err) {
                alert("Failed to delete listing: " + err.message);
            }
        }

        function formatCountdown(ms) {
            if (ms <= 0) return "0s";
            const totalSec = Math.floor(ms / 1000);
            const d = Math.floor(totalSec / 86400);
            const h = Math.floor((totalSec % 86400) / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            if (d > 0) return `${d}d ${h}h`;
            if (h > 0) return `${h}h ${m}m`;
            if (m > 0) return `${m}m ${s}s`;
            return `${s}s`;
        }

        // Live countdown ticker — re-fetches listings when a countdown ends
        let pendingRefresh = false;
        setInterval(() => {
            document.querySelectorAll(".countdown-overlay[data-target]").forEach(el => {
                const target = new Date(el.dataset.target);
                const remaining = target - new Date();
                if (remaining <= 0) {
                    el.textContent = el.dataset.type === "start" ? "Starting..." : "Ended";
                    // Schedule a one-time refresh to pick up the new status
                    if (!pendingRefresh) {
                        pendingRefresh = true;
                        setTimeout(() => {
                            loadListings();
                            pendingRefresh = false;
                        }, 5000);
                    }
                    return;
                }
                const prefix = el.dataset.type === "start" ? "Starts in" : "Ends in";
                el.textContent = `${prefix} ${formatCountdown(remaining)}`;
                // Flash red when under 1 minute
                if (el.dataset.type === "end" && remaining < 60000) {
                    el.classList.remove("countdown-active");
                    el.classList.add("countdown-ending");
                }
            });
        }, 1000);

        loadListings();
        lucide.createIcons();
    </script>
</body>
</html>
