_format_version: "3.0"
services:
- connect_timeout: 60000
  host: bid
  name: bid
  path: /bids
  port: 5002
  protocol: http
  read_timeout: 60000
  retries: 5
  routes:
  - https_redirect_status_code: 426
    name: bid
    path_handling: v0
    paths:
    - /bids
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    request_buffering: true
    response_buffering: true
    strip_path: true
