<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidBoard — Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/shared/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Buyer navbar -->
    <nav class="navbar">
        <div class="container" style="position: relative;">
            <span class="navbar-text">Buyer: <span id="navbar-user-name">Loading...</span></span>
            <span class="navbar-brand" style="position: absolute; left: 50%; transform: translateX(-50%);">BidBoard</span>
            <div id="buyer-switcher" class="d-flex align-items-center ms-auto"></div>
        </div>
    </nav>

    <div class="container" style="margin-top: 2.5rem;">
        <div class="page-header">
            <h2>Marketplace</h2>
            <div class="d-flex gap-2">
                <a href="/buyer/my-bids.html" class="btn-action">My Bids</a>
                <a href="/buyer/my-offers.html" class="btn-action">My Offers</a>
            </div>
        </div>

        <!-- Filter buttons -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="AUCTION">Auctions</button>
            <button class="filter-tab" data-filter="FIXED">Fixed</button>
        </div>

        <!-- Loading spinner -->
        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-secondary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Empty state -->
        <div id="empty-state" class="text-center py-5" style="display: none;">
            <p class="text-muted fs-5">No active listings right now. Check back soon!</p>
        </div>

        <!-- Listing cards grid -->
        <div id="listings-grid" class="row g-4" style="display: none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/js/config.js"></script>
    <script src="/shared/js/api.js"></script>
    <script>
        loadNavbarUser(CONFIG.BUYER_ID);
        initBuyerSwitcher();

        let allListings = [];
        let currentFilter = "all";

        // Filter tab clicks
        document.querySelectorAll(".filter-tab").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-tab").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = btn.dataset.filter;
                renderListings();
            });
        });

        async function loadListings() {
            try {
                const result = await apiFetch(`${CONFIG.LISTING_API}/listings`);
                const listings = result.listings || [];

                allListings = listings;

                const loading = document.getElementById("loading");
                loading.style.display = "none";

                renderListings();

            } catch (err) {
                document.getElementById("loading").style.display = "none";
                document.getElementById("empty-state").style.display = "block";
            }
        }

        function renderListings() {
            const grid = document.getElementById("listings-grid");
            const emptyState = document.getElementById("empty-state");

            const filtered = (currentFilter === "all"
                ? allListings
                : allListings.filter(l => l.listingType === currentFilter))
                .sort((a, b) => b.listingId - a.listingId);

            if (filtered.length === 0) {
                grid.style.display = "none";
                emptyState.style.display = "block";
                return;
            }

            emptyState.style.display = "none";
            grid.style.display = "flex";
            grid.innerHTML = filtered.map(listing => createListingCard(listing)).join("");

            // If any listing has a stale status (should have transitioned), retry
            const needsRefresh = allListings.some(l => {
                if (l.listingType !== "AUCTION" || !l.startTime || !l.endTime) return false;
                const s = parseUtcDate(l.startTime), e = parseUtcDate(l.endTime), now = new Date();
                return (l.status === "SCHEDULED" && s <= now) || (l.status === "ACTIVE" && e <= now);
            });
            if (needsRefresh) setTimeout(() => loadListings(), 5000);
        }

        function createListingCard(listing) {
            const typeBadge = listing.listingType === "AUCTION"
                ? `<span class="badge badge-auction">AUCTION</span>`
                : `<span class="badge badge-fixed">FIXED</span>`;

            const statusBadge = `<span class="badge ${statusBadgeClass(listing.status)}">${statusLabel(listing.status)}</span>`;

            const imageInner = listing.imageUrl
                ? `<img src="${listing.imageUrl}" class="card-img-top" alt="${listing.title}" onerror="this.outerHTML='<div class=\\'img-placeholder\\'>No Image</div>'">`
                : `<div class="img-placeholder">No Image</div>`;

            // Countdown overlay for auctions
            let countdownHtml = "";
            if (listing.listingType === "AUCTION" && listing.startTime && listing.endTime) {
                const now = new Date();
                const start = parseUtcDate(listing.startTime);
                const end = parseUtcDate(listing.endTime);

                if (listing.status === "SCHEDULED" && start > now) {
                    const text = formatCountdown(start - now);
                    countdownHtml = `<div class="countdown-overlay countdown-scheduled" data-target="${start.toISOString()}" data-type="start">Starts in ${text}</div>`;
                } else if (listing.status === "SCHEDULED" && start <= now) {
                    countdownHtml = `<div class="countdown-overlay countdown-scheduled">Starting soon...</div>`;
                } else if (listing.status === "ACTIVE" && end > now) {
                    const remaining = end - now;
                    const cls = remaining < 60000 ? "countdown-ending" : "countdown-active";
                    const text = formatCountdown(remaining);
                    countdownHtml = `<div class="countdown-overlay ${cls}" data-target="${end.toISOString()}" data-type="end">Ends in ${text}</div>`;
                } else if (listing.status === "ACTIVE" && end <= now) {
                    countdownHtml = `<div class="countdown-overlay countdown-ended">Auction Ended</div>`;
                } else if (["CLOSED_PENDING_PAYMENT", "SOLD", "FAILED_NO_ELIGIBLE_BIDDER"].includes(listing.status)) {
                    countdownHtml = `<div class="countdown-overlay countdown-ended">Auction Ended</div>`;
                }
            }

            // Price label
            let priceLabel;
            if (listing.status === "SOLD" && listing.winningPrice) {
                priceLabel = `<span class="price-label">Sold for </span>${formatPrice(listing.winningPrice)}`;
            } else if (listing.listingType === "AUCTION") {
                priceLabel = `<span class="price-label">Starting at </span>${formatPrice(listing.startPrice)}`;
            } else {
                priceLabel = formatPrice(listing.startPrice);
            }

            return `
                <div class="col-md-4 col-sm-6">
                    <div class="card listing-card h-100" onclick="window.location.href='/buyer/listing-detail.html?id=${listing.listingId}'">
                        <div class="card-image-wrapper">
                            ${imageInner}
                            ${countdownHtml}
                        </div>
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-2">${typeBadge} ${statusBadge}</div>
                            <h5 class="card-title">${listing.title}</h5>
                            <p class="card-text price-tag${listing.status === 'SOLD' ? ' price-sold' : ''}">${priceLabel}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function formatCountdown(ms) {
            if (ms <= 0) return "0s";
            const totalSec = Math.floor(ms / 1000);
            const d = Math.floor(totalSec / 86400);
            const h = Math.floor((totalSec % 86400) / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            if (d > 0) return `${d}d ${h}h`;
            if (h > 0) return `${h}h ${m}m`;
            if (m > 0) return `${m}m ${s}s`;
            return `${s}s`;
        }

        // Live countdown ticker
        let pendingRefresh = false;
        setInterval(() => {
            document.querySelectorAll(".countdown-overlay[data-target]").forEach(el => {
                const target = new Date(el.dataset.target);
                const remaining = target - new Date();
                if (remaining <= 0) {
                    el.textContent = el.dataset.type === "start" ? "Starting..." : "Ended";
                    if (!pendingRefresh) {
                        pendingRefresh = true;
                        setTimeout(() => {
                            loadListings();
                            pendingRefresh = false;
                        }, 5000);
                    }
                    return;
                }
                const prefix = el.dataset.type === "start" ? "Starts in" : "Ends in";
                el.textContent = `${prefix} ${formatCountdown(remaining)}`;
                if (el.dataset.type === "end" && remaining < 60000) {
                    el.classList.remove("countdown-active");
                    el.classList.add("countdown-ending");
                }
            });
        }, 1000);

        loadListings();
    </script>
</body>
</html>
