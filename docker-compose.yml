volumes:
  rabbitmq_data:
    name: bidboard_rabbitmq_data
  user_db_data:
    name: bidboard_user_db_data
  bid_db_data:
    name: bidboard_bid_db_data
  listing_db_data:
    name: bidboard_listing_db_data

networks:
  bidboard-net:
    driver: bridge
    name: bidboard-net

services:

  ####################################
  # MySQL: user_db
  ####################################
  user-db:
    image: mysql:8.0
    container_name: user-db
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - user_db_data:/var/lib/mysql
      - ./services/user/user.sql:/docker-entrypoint-initdb.d/user.sql
    networks:
      - bidboard-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  ####################################
  # MySQL: bid_db
  ####################################
  bid-db:
    image: mysql:8.0
    container_name: bid-db
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - bid_db_data:/var/lib/mysql
      - ./services/bid/bid.sql:/docker-entrypoint-initdb.d/bid.sql
    networks:
      - bidboard-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  ####################################
  # MySQL: listing_db
  ####################################
  listing-db:
    image: mysql:8.0
    container_name: listing-db
    restart: always
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - listing_db_data:/var/lib/mysql
      - ./services/listing/listing.sql:/docker-entrypoint-initdb.d/listing.sql
    networks:
      - bidboard-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  ####################################
  # User Service: Flask (port 5004)
  ####################################
  user:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    container_name: user
    restart: always
    ports:
      - "5004:5004"
    environment:
      - dbURL=mysql+mysqlconnector://root:root@user-db:3306/user_db
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - bidboard-net

  ####################################
  # Listing Service: Flask (port 5001)
  ####################################
  listing:
    build:
      context: ./services/listing
      dockerfile: Dockerfile
    container_name: listing
    restart: always
    ports:
      - "5001:5001"
    environment:
      - dbURL=mysql+mysqlconnector://root:root@listing-db:3306/listing_db
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
    depends_on:
      listing-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - bidboard-net

  ####################################
  # Bid Service: Flask (port 5002)
  ####################################
  bid:
    build:
      context: ./services/bid
      dockerfile: Dockerfile
    container_name: bid
    restart: always
    ports:
      - "5002:5002"
    environment:
      - dbURL=mysql+mysqlconnector://root:root@bid-db:3306/bid_db
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
    depends_on:
      bid-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - bidboard-net

  ####################################
  # Dispatch Notification: composite (no port, consumer only)
  ####################################
  dispatch-notification:
    build:
      context: ./services/dispatch_notification
      dockerfile: Dockerfile
    container_name: dispatch-notification
    restart: always
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - USER_SERVICE_URL=http://user:5004
      - LISTING_SERVICE_URL=http://listing:5001
      - NOTIFICATION_SERVICE_URL=http://notification:5006
    depends_on:
      rabbitmq:
        condition: service_started
      user:
        condition: service_started
      listing:
        condition: service_started
    networks:
      - bidboard-net

  ####################################
  # RabbitMQ: messaging broker
  ####################################
  rabbitmq:
    image: rabbitmq:3-management
    hostname: bidboard-rabbit
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - bidboard-net
