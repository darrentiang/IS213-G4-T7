<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidBoard — My Bids</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/shared/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Buyer navbar -->
    <nav class="navbar">
        <div class="container" style="position: relative;">
            <span class="navbar-text">Buyer: <span id="navbar-user-name">Loading...</span></span>
            <a href="/buyer/" class="navbar-brand" style="position: absolute; left: 50%; transform: translateX(-50%);"><i data-lucide="zap"></i> BidBoard</a>
            <div class="d-flex align-items-center ms-auto">
                <div class="navbar-links">
                    <a href="/buyer/my-bids.html"><i data-lucide="list"></i> My Bids</a>
                    <a href="/buyer/my-offers.html"><i data-lucide="message-square-text"></i> My Offers</a>
                </div>
                <div id="buyer-switcher"></div>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 2.5rem; max-width: 900px;">
        <div class="page-header">
            <h2><i data-lucide="list"></i> My Bids</h2>
            <a href="/buyer/" class="btn-action"><i data-lucide="arrow-left"></i> Marketplace</a>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-5">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Empty state -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-icon"><i data-lucide="file-text"></i></div>
            <p>You haven't placed any bids yet.</p>
            <a href="/buyer/" class="btn btn-dark"><i data-lucide="store"></i> Browse Listings</a>
        </div>

        <!-- Bids table -->
        <div id="bids-table-wrapper" style="display: none;">
            <table class="table">
                <thead>
                    <tr>
                        <th>Listing</th>
                        <th>Your Bid</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="bids-body"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/js/config.js"></script>
    <script src="/shared/js/api.js"></script>
    <script>
        loadNavbarUser(CONFIG.BUYER_ID);
        initBuyerSwitcher();
        highlightNavLinks();

        async function loadBids() {
            try {
                const result = await apiFetch(`${CONFIG.BID_API}/bids?buyerId=${CONFIG.BUYER_ID}`);
                const bids = (result.bids || []).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                document.getElementById("loading").style.display = "none";

                if (bids.length === 0) {
                    document.getElementById("empty-state").style.display = "block";
                    return;
                }

                // Fetch listing details in parallel
                const listingIds = [...new Set(bids.map(b => b.listingId))];
                const listingData = {};
                await Promise.all(listingIds.map(async (id) => {
                    try {
                        const listing = await apiFetch(`${CONFIG.LISTING_API}/listings/${id}`);
                        listingData[id] = listing;
                    } catch {
                        listingData[id] = null;
                    }
                }));

                // Render table
                const tbody = document.getElementById("bids-body");
                tbody.innerHTML = bids.map(bid => {
                    const listing = listingData[bid.listingId];
                    const title = listing ? listing.title : `Listing #${bid.listingId}`;
                    const statusBadge = `<span class="badge ${buyerStatusBadgeClass(listing, CONFIG.BUYER_ID)}">${buyerStatusLabel(listing, CONFIG.BUYER_ID)}</span>`;

                    return `<tr>
                        <td><a href="/buyer/listing-detail.html?id=${bid.listingId}" class="text-decoration-none">${title}</a></td>
                        <td class="fw-medium">${formatPrice(bid.amount)}</td>
                        <td>${formatDateTime(bid.createdAt)}</td>
                        <td>${statusBadge}</td>
                    </tr>`;
                }).join("");

                document.getElementById("bids-table-wrapper").style.display = "block";

            } catch (err) {
                document.getElementById("loading").style.display = "none";
                document.getElementById("empty-state").style.display = "block";
            }
        }

        loadBids();
        lucide.createIcons();
    </script>
</body>
</html>
