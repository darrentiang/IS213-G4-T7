_format_version: "3.0"

plugins:
- name: cors
  enabled: true
  protocols:
  - http
  - https
  config:
    credentials: false
    headers:
    - Content-Type
    methods:
    - GET
    - HEAD
    - PUT
    - PATCH
    - POST
    - DELETE
    - OPTIONS
    origins:
    - '*'

- name: rate-limiting
  enabled: true
  protocols:
  - http
  - https
  route: bid
  config:
    minute: 5
    limit_by: ip
    policy: local
    fault_tolerant: true

services:
- name: user
  host: user
  port: 5004
  path: /users
  protocol: http
  routes:
  - name: user
    paths:
    - /users
    strip_path: true
    protocols:
    - http
    - https

- name: listing
  host: listing
  port: 5001
  path: /listings
  protocol: http
  routes:
  - name: listing
    paths:
    - /listings
    strip_path: true
    protocols:
    - http
    - https

- name: bid
  host: bid
  port: 5002
  path: /bids
  protocol: http
  routes:
  - name: bid
    paths:
    - /bids
    strip_path: true
    protocols:
    - http
    - https

- name: ranked-bids
  host: bid
  port: 5002
  path: /auctions
  protocol: http
  routes:
  - name: ranked_bids
    paths:
    - /auctions
    strip_path: true
    protocols:
    - http
    - https

- name: offer
  host: offer
  port: 5003
  path: /offers
  protocol: http
  routes:
  - name: offer
    paths:
    - /offers
    strip_path: true
    protocols:
    - http
    - https

- name: payment
  host: payment
  port: 5005
  path: /payments
  protocol: http
  routes:
  - name: payment
    paths:
    - /payments
    strip_path: true
    protocols:
    - http
    - https
