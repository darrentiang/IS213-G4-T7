<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidBoard — My Offers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/shared/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Buyer navbar -->
    <nav class="navbar">
        <div class="container" style="position: relative;">
            <span class="navbar-text">Buyer: <span id="navbar-user-name">Loading...</span></span>
            <span class="navbar-brand" style="position: absolute; left: 50%; transform: translateX(-50%);"><i class="bi bi-hammer"></i> BidBoard</span>
            <div id="buyer-switcher" class="d-flex align-items-center ms-auto"></div>
        </div>
    </nav>

    <div class="container" style="margin-top: 2.5rem; max-width: 900px;">
        <div class="page-header">
            <h2><i class="bi bi-chat-left-text"></i> My Offers</h2>
            <a href="/buyer/" class="btn-action"><i class="bi bi-arrow-left"></i> Marketplace</a>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-5">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Empty state -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-icon"><i class="bi bi-chat-left-text"></i></div>
            <p>You haven't made any offers yet.</p>
            <a href="/buyer/" class="btn btn-dark"><i class="bi bi-shop-window"></i> Browse Listings</a>
        </div>

        <!-- Offers table -->
        <div id="offers-table-wrapper" style="display: none;">
            <table class="table">
                <thead>
                    <tr>
                        <th>Listing</th>
                        <th>Your Offer</th>
                        <th>Counter</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="offers-body"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/js/config.js"></script>
    <script src="/shared/js/api.js"></script>
    <script>
        loadNavbarUser(CONFIG.BUYER_ID);
        initBuyerSwitcher();

        async function loadOffers() {
            try {
                const result = await apiFetch(`${CONFIG.OFFER_API}/offers?buyerId=${CONFIG.BUYER_ID}`);
                const offers = (result.offers || []).sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

                document.getElementById("loading").style.display = "none";

                if (offers.length === 0) {
                    document.getElementById("empty-state").style.display = "block";
                    return;
                }

                // Fetch listing titles in parallel
                const listingIds = [...new Set(offers.map(o => o.listingId))];
                const listingTitles = {};
                await Promise.all(listingIds.map(async (id) => {
                    try {
                        const listing = await apiFetch(`${CONFIG.LISTING_API}/listings/${id}`);
                        listingTitles[id] = listing.title;
                    } catch {
                        listingTitles[id] = `Listing #${id}`;
                    }
                }));

                // Render table
                const tbody = document.getElementById("offers-body");
                tbody.innerHTML = offers.map(offer => {
                    const statusBadge = `<span class="badge ${offerBadgeClass(offer.status)}">${offerLabel(offer.status)}</span>`;
                    // When countered, the amount field IS the counter amount
                    const counterDisplay = offer.status === "COUNTERED"
                        ? formatPrice(offer.amount)
                        : "—";

                    let actions = "";
                    if (offer.status === "COUNTERED" && offer.turn === "BUYER") {
                        actions = `<div class="d-flex gap-2">
                            <button class="btn btn-dark btn-sm" onclick="acceptOffer(${offer.offerId})">Accept</button>
                            <button class="btn btn-outline-secondary btn-sm" onclick="rejectOffer(${offer.offerId})">Reject</button>
                        </div>`;
                    } else if (offer.status === "PENDING") {
                        actions = `<span class="text-muted" style="font-size: 0.82rem;">Waiting...</span>`;
                    }

                    const title = listingTitles[offer.listingId] || `Listing #${offer.listingId}`;

                    return `<tr>
                        <td><a href="/buyer/listing-detail.html?id=${offer.listingId}" class="text-decoration-none">${title}</a></td>
                        <td class="fw-medium">${formatPrice(offer.amount)}</td>
                        <td>${counterDisplay}</td>
                        <td>${statusBadge}</td>
                        <td>${actions}</td>
                    </tr>`;
                }).join("");

                document.getElementById("offers-table-wrapper").style.display = "block";

            } catch (err) {
                document.getElementById("loading").style.display = "none";
                document.getElementById("empty-state").style.display = "block";
            }
        }

        async function acceptOffer(offerId) {
            try {
                await apiFetch(`${CONFIG.OFFER_API}/offers/${offerId}/accept`, {
                    method: "POST"
                });
                loadOffers();
            } catch (err) {
                alert("Failed to accept: " + err.message);
            }
        }

        async function rejectOffer(offerId) {
            try {
                await apiFetch(`${CONFIG.OFFER_API}/offers/${offerId}/reject`, {
                    method: "POST"
                });
                loadOffers();
            } catch (err) {
                alert("Failed to reject: " + err.message);
            }
        }

        loadOffers();
    </script>
</body>
</html>
