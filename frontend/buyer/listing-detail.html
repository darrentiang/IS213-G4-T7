<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidBoard — Listing Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/shared/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Buyer navbar -->
    <nav class="navbar">
        <div class="container navbar-grid">
            <span class="navbar-text">Buyer: <span id="navbar-user-name">Loading...</span></span>
            <a href="/buyer/" class="navbar-brand"><i data-lucide="zap"></i> BidBoard</a>
            <div class="navbar-grid-end">
                <div class="navbar-links">
                    <a href="/buyer/my-bids.html"><i data-lucide="list"></i> My Bids</a>
                    <a href="/buyer/my-offers.html"><i data-lucide="message-square-text"></i> My Offers</a>
                </div>
                <button class="navbar-hamburger" onclick="document.getElementById('nav-dropdown').classList.toggle('show')"><i data-lucide="menu"></i></button>
                <div id="nav-dropdown" class="navbar-dropdown">
                    <a href="/buyer/my-bids.html"><i data-lucide="list"></i> My Bids</a>
                    <a href="/buyer/my-offers.html"><i data-lucide="message-square-text"></i> My Offers</a>
                </div>
                <div id="buyer-switcher"></div>
            </div>
        </div>
    </nav>


    <div class="container" style="margin-top: 2.5rem; max-width: 900px;">
        <!-- Loading -->
        <div id="loading" class="text-center py-5">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Main content (hidden until loaded) -->
        <div id="detail-content" style="display: none;">

            <div class="page-header">
                <h2><i data-lucide="tag"></i> Listing Detail</h2>
                <a href="/buyer/" class="btn-action"><i data-lucide="arrow-left"></i> Marketplace</a>
            </div>

            <!-- Listing header -->
            <div class="detail-header">
                <div class="detail-image-wrapper">
                    <div id="listing-image"></div>
                    <div id="countdown-container"></div>
                </div>
                <div class="detail-info">
                    <div class="d-flex gap-2 mb-2" id="listing-badges"></div>
                    <h1 id="listing-title" class="detail-title"></h1>
                    <p id="listing-description" class="detail-description"></p>
                    <div id="listing-price" class="detail-price-section"></div>
                    <div id="listing-times" class="detail-times"></div>

                    <!-- Bid form (auction) — inline with listing info -->
                    <div id="bid-form-section" class="form-section mt-3" style="display: none;">
                        <h3 class="section-title" style="border: none; padding: 0; margin-bottom: 0.75rem;">Place a Bid</h3>
                        <div id="bid-alert"></div>
                        <div class="d-flex gap-2 align-items-end">
                            <div style="flex: 1;">
                                <label for="bid-amount" class="form-label">Your bid amount ($)</label>
                                <input type="number" id="bid-amount" class="form-control" step="0.01" min="0" placeholder="0.00">
                            </div>
                            <button id="bid-submit" class="btn btn-dark" onclick="placeBid()">Place Bid</button>
                        </div>
                        <p id="bid-hint" class="text-muted mt-2 mb-0" style="font-size: 0.78rem;"></p>
                    </div>

                    <!-- Offer form (fixed) — inline with listing info -->
                    <div id="offer-form-section" class="form-section mt-3" style="display: none;">
                        <h3 class="section-title" style="border: none; padding: 0; margin-bottom: 0.75rem;">Make an Offer</h3>
                        <div id="offer-alert"></div>
                        <div class="d-flex gap-2 align-items-end">
                            <div style="flex: 1;">
                                <label for="offer-amount" class="form-label">Your offer amount ($)</label>
                                <input type="number" id="offer-amount" class="form-control" step="0.01" min="0" placeholder="0.00">
                            </div>
                            <button class="btn btn-dark" onclick="makeOffer()">Submit Offer</button>
                        </div>
                    </div>

                    <!-- Offer status (fixed) — inline with listing info -->
                    <div id="offer-status-section" style="display: none;">
                        <h3 class="section-title" style="margin-top: 1rem;">Your Offer</h3>
                        <div id="offer-status-content"></div>
                    </div>
                </div>
            </div>

            <!-- AUCTION: Bid history -->
            <div id="auction-section" style="display: none;">
                <h3 class="section-title">Bid History</h3>
                <div id="bids-empty" class="empty-state" style="display: none;">
                    <div class="empty-icon"><i data-lucide="file-text"></i></div>
                    <p>No bids yet. Be the first!</p>
                </div>
                <div id="bids-table-wrapper" style="display: none;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Bidder</th>
                                <th>Amount</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody id="bids-body"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/js/config.js"></script>
    <script src="/shared/js/api.js"></script>
    <script>
        loadNavbarUser(CONFIG.BUYER_ID);
        initBuyerSwitcher();
        highlightNavLinks();

        const listingId = getQueryParam("id");
        if (!listingId) {
            window.location.href = "/buyer/";
        }

        let currentListing = null;
        let currentHighestBid = null;

        async function loadListing() {
            try {
                const listing = await apiFetch(`${CONFIG.LISTING_API}/listings/${listingId}`);
                currentListing = listing;

                // Image
                const imageEl = document.getElementById("listing-image");
                if (listing.imageUrl) {
                    imageEl.innerHTML = `<img src="${listing.imageUrl}" alt="${listing.title}" onerror="this.outerHTML='<div class=\\'img-placeholder detail-img-placeholder\\'>No Image</div>'">`
                } else {
                    imageEl.innerHTML = `<div class="img-placeholder detail-img-placeholder">No Image</div>`;
                }

                // Countdown
                const countdownEl = document.getElementById("countdown-container");
                countdownEl.innerHTML = "";
                if (listing.listingType === "AUCTION" && listing.startTime && listing.endTime) {
                    const now = new Date();
                    const start = parseUtcDate(listing.startTime);
                    const end = parseUtcDate(listing.endTime);

                    if (listing.status === "SCHEDULED" && start > now) {
                        countdownEl.innerHTML = `<div class="countdown-overlay countdown-scheduled" data-target="${start.toISOString()}" data-type="start">Starts in ${formatCountdown(start - now)}</div>`;
                    } else if (listing.status === "SCHEDULED" && start <= now) {
                        countdownEl.innerHTML = `<div class="countdown-overlay countdown-scheduled">Starting soon...</div>`;
                    } else if (listing.status === "ACTIVE" && end > now) {
                        const remaining = end - now;
                        const cls = remaining < 60000 ? "countdown-ending" : "countdown-active";
                        countdownEl.innerHTML = `<div class="countdown-overlay ${cls}" data-target="${end.toISOString()}" data-type="end">Ends in ${formatCountdown(remaining)}</div>`;
                    } else if (listing.status === "ACTIVE" && end <= now) {
                        countdownEl.innerHTML = `<div class="countdown-overlay countdown-ended">Auction Ended</div>`;
                    } else if (["CLOSED_PENDING_PAYMENT", "SOLD", "FAILED_NO_ELIGIBLE_BIDDER"].includes(listing.status)) {
                        countdownEl.innerHTML = `<div class="countdown-overlay countdown-ended">Auction Ended</div>`;
                    }
                }

                // Badges
                const typeBadge = listing.listingType === "AUCTION"
                    ? `<span class="badge badge-auction">AUCTION</span>`
                    : `<span class="badge badge-fixed">FIXED</span>`;
                const statusBadge = `<span class="badge ${statusBadgeClass(listing.status)}">${statusLabel(listing.status)}</span>`;
                document.getElementById("listing-badges").innerHTML = `${typeBadge} ${statusBadge}`;

                // Title & description
                document.getElementById("listing-title").textContent = listing.title;
                const descEl = document.getElementById("listing-description");
                if (listing.description) {
                    descEl.textContent = listing.description;
                    descEl.style.display = "";
                } else {
                    descEl.style.display = "none";
                }

                // Price (will be updated by loadBids for auctions)
                document.getElementById("listing-price").innerHTML =
                    `<span class="price-label-detail">${listing.listingType === "AUCTION" ? "Starting price" : "Asking price"}</span>
                     <span class="price-display">${formatPrice(listing.startPrice)}</span>`;

                // Time info
                const timesEl = document.getElementById("listing-times");
                const timeText = formatListingTime(listing);
                if (timeText) {
                    timesEl.textContent = timeText;
                    timesEl.style.display = "";
                } else {
                    timesEl.style.display = "none";
                }

                // Show appropriate section
                if (listing.listingType === "AUCTION") {
                    document.getElementById("auction-section").style.display = "block";
                    document.getElementById("bid-form-section").style.display =
                        listing.status === "ACTIVE" ? "" : "none";
                    loadBids();
                    if (listing.status === "ACTIVE") connectBidWebSocket(listingId);
                } else {
                    document.getElementById("offer-form-section").style.display =
                        listing.status === "ACTIVE" ? "" : "none";
                    loadOfferStatus();
                }

                // Show content
                document.getElementById("loading").style.display = "none";
                document.getElementById("detail-content").style.display = "block";

                // If status is stale (should have transitioned), keep retrying
                if (listing.listingType === "AUCTION" && listing.startTime && listing.endTime) {
                    const now2 = new Date();
                    const stale = (listing.status === "SCHEDULED" && parseUtcDate(listing.startTime) <= now2)
                              || (listing.status === "ACTIVE" && parseUtcDate(listing.endTime) <= now2);
                    if (stale) setTimeout(() => loadListing(), 5000);
                }

            } catch (err) {
                document.getElementById("loading").innerHTML =
                    `<p class="text-muted">Listing not found. <a href="/buyer/">Back to marketplace</a></p>`;
            }
        }

        async function loadBids() {
            try {
                const result = await apiFetch(`${CONFIG.BID_API}/bids?listingId=${listingId}`);
                const bids = (result.bids || []).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                if (bids.length === 0) {
                    const emptyEl = document.getElementById("bids-empty");
                    const isEnded = ["CLOSED_PENDING_PAYMENT", "SOLD", "FAILED_NO_ELIGIBLE_BIDDER"].includes(currentListing.status);
                    const isScheduled = currentListing.status === "SCHEDULED";
                    if (isEnded) emptyEl.querySelector("p").textContent = "No bids were placed.";
                    else if (isScheduled) emptyEl.querySelector("p").textContent = "Bidding hasn't started yet.";
                    else emptyEl.querySelector("p").textContent = "No bids yet. Be the first!";
                    emptyEl.style.display = "";
                    document.getElementById("bids-table-wrapper").style.display = "none";
                    currentHighestBid = null;
                    // Set hint
                    document.getElementById("bid-hint").textContent =
                        `Minimum bid: ${formatPrice(currentListing.startPrice)}`;
                    return;
                }

                currentHighestBid = bids.reduce((max, b) => b.amount > max.amount ? b : max, bids[0]);

                // Update price section
                const isSold = currentListing.status === "SOLD" && currentListing.winningPrice;
                const isEnded = ["CLOSED_PENDING_PAYMENT", "SOLD", "FAILED_NO_ELIGIBLE_BIDDER"].includes(currentListing.status);
                if (isSold) {
                    document.getElementById("listing-price").innerHTML =
                        `<span class="price-label-detail">Sold for</span>
                         <span class="price-display-sold">${formatPrice(currentListing.winningPrice)}</span>
                         <span class="price-start-note">Starting price: ${formatPrice(currentListing.startPrice)}</span>`;
                } else {
                    const priceLabel = isEnded ? "Highest bid" : "Current highest bid";
                    document.getElementById("listing-price").innerHTML =
                        `<span class="price-label-detail">${priceLabel}</span>
                         <span class="price-display">${formatPrice(currentHighestBid.amount)}</span>
                         <span class="price-start-note">Starting price: ${formatPrice(currentListing.startPrice)}</span>`;
                }

                // Set hint
                document.getElementById("bid-hint").textContent =
                    `Must be higher than ${formatPrice(currentHighestBid.amount)}`;

                // Fetch buyer names
                const buyerIds = [...new Set(bids.map(b => b.buyerId))];
                const buyerNames = {};
                await Promise.all(buyerIds.map(async (id) => {
                    try {
                        const user = await fetchUser(id);
                        buyerNames[id] = id === CONFIG.BUYER_ID ? `${user.name} (You)` : user.name;
                    } catch {
                        buyerNames[id] = `User #${id}`;
                    }
                }));

                // Render table
                const winnerId = currentListing.winningBuyerId;
                const winnerPrice = currentListing.winningPrice;
                const tbody = document.getElementById("bids-body");
                tbody.innerHTML = bids.map((bid, i) => {
                    const isWinner = currentListing.status === "SOLD" && bid.buyerId === winnerId && bid.amount === winnerPrice;
                    const isHighest = bid.amount === currentHighestBid.amount && currentListing.status !== "SOLD";
                    const rowClass = isWinner ? "bid-row-highest" : isHighest ? "bid-row-highest" : "";
                    const badge = isWinner ? ' <span class="badge bg-success badge-winner">Winner</span>' : "";
                    return `<tr class="${rowClass}">
                        <td>${i + 1}</td>
                        <td>${buyerNames[bid.buyerId] || `User #${bid.buyerId}`}${badge}</td>
                        <td class="fw-medium">${formatPrice(bid.amount)}</td>
                        <td>${formatDateTime(bid.createdAt)}</td>
                    </tr>`;
                }).join("");

                document.getElementById("bids-empty").style.display = "none";
                document.getElementById("bids-table-wrapper").style.display = "block";

            } catch (err) {
                const emptyEl = document.getElementById("bids-empty");
                const isEnded = ["CLOSED_PENDING_PAYMENT", "SOLD", "FAILED_NO_ELIGIBLE_BIDDER"].includes(currentListing.status);
                emptyEl.querySelector("p").textContent = isEnded ? "No bids were placed." : "No bids yet. Be the first!";
                emptyEl.style.display = "";
                document.getElementById("bids-table-wrapper").style.display = "none";
                currentHighestBid = null;
                document.getElementById("bid-hint").textContent =
                    `Minimum bid: ${formatPrice(currentListing.startPrice)}`;
            }
        }

        async function placeBid() {
            const alertEl = document.getElementById("bid-alert");
            const amountInput = document.getElementById("bid-amount");
            const amount = parseFloat(amountInput.value);

            if (!amount || amount <= 0) {
                alertEl.innerHTML = `<div class="alert alert-danger py-2">Please enter a valid amount.</div>`;
                return;
            }

            // Validate against minimum
            const minBid = currentHighestBid ? currentHighestBid.amount : currentListing.startPrice;
            if (amount <= minBid) {
                alertEl.innerHTML = `<div class="alert alert-danger py-2">Bid must be higher than ${formatPrice(minBid)}.</div>`;
                return;
            }

            const btn = document.getElementById("bid-submit");
            btn.disabled = true;
            btn.textContent = "Placing...";

            try {
                await apiFetch(`${CONFIG.BID_API}/bids`, {
                    method: "POST",
                    body: JSON.stringify({
                        listingId: parseInt(listingId),
                        buyerId: CONFIG.BUYER_ID,
                        amount: amount
                    })
                });

                alertEl.innerHTML = `<div class="alert alert-success py-2">Bid of ${formatPrice(amount)} placed!</div>`;
                amountInput.value = "";
                loadBids();

            } catch (err) {
                alertEl.innerHTML = `<div class="alert alert-danger py-2">${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = "Place Bid";
            }
        }

        function connectBidWebSocket(listingId) {
            const wsUrl = `ws://${window.location.hostname}:8000/ws`;
            const ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                ws.send(JSON.stringify({ action: "subscribe", listingId: listingId }));
                console.log(`[ws] Subscribed to live bid updates for listing ${listingId}`);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.event === "bid.placed" && String(data.listingId) === String(listingId)) {
                    loadBids();
                }
            };

            ws.onclose = () => {
                // reconnect after 3s if the connection drops (e.g. server restart)
                setTimeout(() => connectBidWebSocket(listingId), 3000);
            };
        }

        async function loadOfferStatus() {
            try {
                const result = await apiFetch(`${CONFIG.OFFER_API}/offers?listingId=${listingId}&buyerId=${CONFIG.BUYER_ID}`);
                const offers = result.offers || [];

                // Find active offer (not CANCELLED or REJECTED)
                const activeOffer = offers.find(o => !["CANCELLED", "REJECTED"].includes(o.status));
                // Find cancelled offer for history display
                const cancelledOffer = !activeOffer ? offers.find(o => o.status === "CANCELLED") : null;

                if (!activeOffer && !cancelledOffer) {
                    // No offers at all — show form only if listing is still active
                    if (currentListing.status === "ACTIVE") {
                        document.getElementById("offer-form-section").style.display = "";
                    }
                    document.getElementById("offer-status-section").style.display = "none";
                    return;
                }

                // Show the active offer, or the cancelled offer as history
                const displayOffer = activeOffer || cancelledOffer;

                // Active offer hides the form; cancelled offer allows a new offer
                if (activeOffer) {
                    document.getElementById("offer-form-section").style.display = "none";
                } else if (currentListing.status === "ACTIVE") {
                    document.getElementById("offer-form-section").style.display = "";
                }
                document.getElementById("offer-status-section").style.display = "";

                const statusBadge = `<span class="badge ${offerBadgeClass(displayOffer.status)}">${offerLabel(displayOffer.status)}</span>`;

                let content = `
                    <div class="form-section">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="fw-medium">Your offer: ${formatPrice(displayOffer.amount)}</span>
                            ${statusBadge}
                        </div>`;

                if (displayOffer.status === "CANCELLED") {
                    content += `<p class="text-muted mb-0" style="font-size: 0.85rem;">Payment failed. Your offer was cancelled. You may submit a new offer.</p>`;
                } else if (displayOffer.status === "COUNTERED" && displayOffer.turn === "BUYER") {
                    content += `
                        <p class="text-muted mb-2" style="font-size: 0.85rem;">
                            The seller countered with <strong>${formatPrice(displayOffer.amount)}</strong>.
                        </p>
                        <div class="d-flex gap-2">
                            <button class="btn btn-dark btn-sm" onclick="acceptOffer(${displayOffer.offerId})">Accept Counter</button>
                            <button class="btn btn-outline-secondary btn-sm" onclick="rejectOffer(${displayOffer.offerId})">Reject</button>
                        </div>`;
                } else if (displayOffer.status === "COUNTERED" && displayOffer.turn === "SELLER") {
                    content += `<p class="text-muted mb-0" style="font-size: 0.85rem;">Waiting for seller to respond...</p>`;
                } else if (displayOffer.status === "PENDING") {
                    content += `<p class="text-muted mb-0" style="font-size: 0.85rem;">Waiting for seller to respond...</p>`;
                } else if (displayOffer.status === "ACCEPTED") {
                    content += `<p class="text-muted mb-0" style="font-size: 0.85rem;">Your offer was accepted! Payment will be processed.</p>`;
                }

                content += `</div>`;
                document.getElementById("offer-status-content").innerHTML = content;

            } catch (err) {
                if (currentListing.status === "ACTIVE") {
                    document.getElementById("offer-form-section").style.display = "";
                }
                document.getElementById("offer-status-section").style.display = "none";
            }
        }

        async function makeOffer() {
            const alertEl = document.getElementById("offer-alert");
            const amountInput = document.getElementById("offer-amount");
            const amount = parseFloat(amountInput.value);

            if (!amount || amount <= 0) {
                alertEl.innerHTML = `<div class="alert alert-danger py-2">Please enter a valid amount.</div>`;
                return;
            }

            try {
                await apiFetch(`${CONFIG.OFFER_API}/offers`, {
                    method: "POST",
                    body: JSON.stringify({
                        listingId: parseInt(listingId),
                        buyerId: CONFIG.BUYER_ID,
                        sellerId: currentListing.sellerId,
                        amount: amount
                    })
                });

                alertEl.innerHTML = `<div class="alert alert-success py-2">Offer of ${formatPrice(amount)} submitted!</div>`;
                amountInput.value = "";
                // Switch to offer status view
                setTimeout(() => loadOfferStatus(), 1000);

            } catch (err) {
                alertEl.innerHTML = `<div class="alert alert-danger py-2">${err.message}</div>`;
            }
        }

        async function acceptOffer(offerId) {
            try {
                await apiFetch(`${CONFIG.OFFER_API}/offers/${offerId}/accept`, {
                    method: "POST"
                });
                loadOfferStatus();
            } catch (err) {
                alert("Failed to accept: " + err.message);
            }
        }

        async function rejectOffer(offerId) {
            try {
                await apiFetch(`${CONFIG.OFFER_API}/offers/${offerId}/reject`, {
                    method: "POST"
                });
                loadOfferStatus();
            } catch (err) {
                alert("Failed to reject: " + err.message);
            }
        }

        function formatCountdown(ms) {
            if (ms <= 0) return "0s";
            const totalSec = Math.floor(ms / 1000);
            const d = Math.floor(totalSec / 86400);
            const h = Math.floor((totalSec % 86400) / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            if (d > 0) return `${d}d ${h}h`;
            if (h > 0) return `${h}h ${m}m`;
            if (m > 0) return `${m}m ${s}s`;
            return `${s}s`;
        }

        // Live countdown + auto-refresh
        let pendingRefresh = false;
        setInterval(() => {
            document.querySelectorAll(".countdown-overlay[data-target]").forEach(el => {
                const target = new Date(el.dataset.target);
                const remaining = target - new Date();
                if (remaining <= 0) {
                    el.textContent = el.dataset.type === "start" ? "Starting..." : "Ended";
                    if (!pendingRefresh) {
                        pendingRefresh = true;
                        setTimeout(() => {
                            loadListing();
                            pendingRefresh = false;
                        }, 5000);
                    }
                    return;
                }
                const prefix = el.dataset.type === "start" ? "Starts in" : "Ends in";
                el.textContent = `${prefix} ${formatCountdown(remaining)}`;
                if (el.dataset.type === "end" && remaining < 60000) {
                    el.classList.remove("countdown-active");
                    el.classList.add("countdown-ending");
                }
            });
        }, 1000);

        loadListing();
        lucide.createIcons();
    </script>
</body>
</html>
