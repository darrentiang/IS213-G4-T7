<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidBoard — Create Listing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/shared/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Seller navbar -->
    <nav class="navbar">
        <div class="container" style="position: relative;">
            <span class="navbar-text">Seller: <span id="navbar-user-name">Loading...</span></span>
            <a href="/seller/" class="navbar-brand" style="position: absolute; left: 50%; transform: translateX(-50%);"><i class="bi bi-lightning-charge-fill"></i> BidBoard</a>
        </div>
    </nav>

    <div class="container" style="margin-top: 2.5rem; max-width: 720px;">
        <div class="page-header">
            <h2><i class="bi bi-plus-circle-fill"></i> Create New Listing</h2>
            <a href="/seller/" class="btn-action"><i class="bi bi-arrow-left"></i> Back to Listings</a>
        </div>

        <!-- Success / error alerts -->
        <div id="alert-container"></div>

        <form id="create-listing-form">
            <!-- Listing Type -->
            <div class="d-flex gap-3 mb-4">
                <input type="radio" name="listingType" id="type-auction" value="AUCTION" checked class="d-none">
                <label for="type-auction" class="type-card type-card-auction selected" id="card-auction">
                    <i class="bi bi-clock-history"></i>
                    <span class="type-card-title">Timed Auction</span>
                    <span class="type-card-desc">Buyers bid, highest wins</span>
                </label>
                <input type="radio" name="listingType" id="type-fixed" value="FIXED" class="d-none">
                <label for="type-fixed" class="type-card type-card-fixed" id="card-fixed">
                    <i class="bi bi-tag"></i>
                    <span class="type-card-title">Fixed Price</span>
                    <span class="type-card-desc">Buyers make offers to negotiate</span>
                </label>
            </div>

            <!-- Basic Info -->
            <div class="form-section">
                <div class="mb-3">
                    <label for="title" class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="title" required placeholder="e.g. Vintage Rolex Watch">
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label fw-semibold">Description</label>
                    <textarea class="form-control" id="description" rows="3" placeholder="Describe your item..."></textarea>
                </div>
                <div class="mb-3">
                    <label for="imageUrl" class="form-label fw-semibold">Image URL</label>
                    <input type="url" class="form-control" id="imageUrl" placeholder="https://example.com/image.jpg">
                </div>
                <div class="mb-3">
                    <label for="startPrice" class="form-label fw-semibold" id="price-label">Starting Price ($) <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="startPrice" step="0.01" min="0.01" required placeholder="0.00">
                </div>
            </div>

            <!-- Auction Schedule (shown only for AUCTION) -->
            <div class="form-section" id="auction-fields">
                <h6 class="fw-semibold mb-3"><i class="bi bi-stopwatch" style="margin-right: 0.3rem;"></i> Auction Schedule</h6>

                <!-- Starts in -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Starts in</label>
                    <div class="preset-pills" id="start-presets">
                        <button type="button" class="preset-pill active" data-minutes="1">1 min</button>
                        <button type="button" class="preset-pill" data-minutes="5">5 min</button>
                        <button type="button" class="preset-pill" data-minutes="15">15 min</button>
                        <button type="button" class="preset-pill" data-minutes="30">30 min</button>
                        <button type="button" class="preset-pill" data-custom="start">Custom</button>
                    </div>
                    <div id="custom-start-wrapper" style="display: none; margin-top: 0.5rem;">
                        <input type="datetime-local" class="form-control" id="startTime">
                        <span class="form-text text-muted">SGT (UTC+8)</span>
                    </div>
                </div>

                <!-- Duration -->
                <div class="mb-1">
                    <label class="form-label fw-semibold">Duration</label>
                    <div class="preset-pills" id="duration-presets">
                        <button type="button" class="preset-pill active" data-minutes="1">1 min</button>
                        <button type="button" class="preset-pill" data-minutes="3">3 min</button>
                        <button type="button" class="preset-pill" data-minutes="15">15 min</button>
                        <button type="button" class="preset-pill" data-minutes="60">1 hour</button>
                        <button type="button" class="preset-pill" data-custom="end">Custom</button>
                    </div>
                    <div id="custom-end-wrapper" style="display: none; margin-top: 0.5rem;">
                        <input type="datetime-local" class="form-control" id="endTime">
                        <span class="form-text text-muted">SGT (UTC+8)</span>
                    </div>
                </div>

                <!-- Summary line -->
                <div id="schedule-summary" class="schedule-summary"></div>
            </div>

            <button type="submit" class="btn btn-dark btn-lg w-100" id="submit-btn">Create Listing</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/js/config.js"></script>
    <script src="/shared/js/api.js"></script>
    <script>
        loadNavbarUser(CONFIG.SELLER_ID);

        const pad = (n) => String(n).padStart(2, "0");
        const toLocalStr = (d) =>
            `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;

        // ── Listing type cards ──
        const cardAuction = document.getElementById("card-auction");
        const cardFixed = document.getElementById("card-fixed");
        const auctionFields = document.getElementById("auction-fields");

        document.querySelectorAll('input[name="listingType"]').forEach(radio => {
            radio.addEventListener("change", () => {
                const isAuction = radio.value === "AUCTION" && radio.checked;
                cardAuction.classList.toggle("selected", document.getElementById("type-auction").checked);
                cardFixed.classList.toggle("selected", document.getElementById("type-fixed").checked);
                auctionFields.style.display = document.getElementById("type-auction").checked ? "block" : "none";
                document.getElementById("price-label").innerHTML = document.getElementById("type-auction").checked
                    ? 'Starting Price ($) <span class="text-danger">*</span>'
                    : 'Asking Price ($) <span class="text-danger">*</span>';
            });
        });

        // ── Preset pill logic ──
        let startPreset = 1;      // minutes from now, or null if custom
        let durationPreset = 1;   // minutes, or null if custom

        function initPresets(containerId, wrapperId, onSelect) {
            const container = document.getElementById(containerId);
            container.querySelectorAll(".preset-pill").forEach(pill => {
                pill.addEventListener("click", () => {
                    container.querySelectorAll(".preset-pill").forEach(p => p.classList.remove("active"));
                    pill.classList.add("active");
                    const isCustom = pill.hasAttribute("data-custom");
                    document.getElementById(wrapperId).style.display = isCustom ? "" : "none";
                    onSelect(isCustom ? null : parseInt(pill.dataset.minutes));
                });
            });
        }

        initPresets("start-presets", "custom-start-wrapper", (mins) => {
            startPreset = mins;
            updateSummary();
        });

        initPresets("duration-presets", "custom-end-wrapper", (mins) => {
            durationPreset = mins;
            updateSummary();
        });

        function updateSummary() {
            const el = document.getElementById("schedule-summary");
            if (startPreset !== null && durationPreset !== null) {
                el.innerHTML = `<i class="bi bi-info-circle"></i> Auction starts in <strong>${startPreset} min</strong>, runs for <strong>${durationPreset} min</strong>`;
            } else {
                el.textContent = "";
            }
        }
        updateSummary();

        // ── Compute times at submit ──
        function getAuctionTimes() {
            let startDate, endDate;
            const now = new Date();

            if (startPreset !== null) {
                startDate = new Date(now.getTime() + startPreset * 60 * 1000);
            } else {
                startDate = new Date(document.getElementById("startTime").value);
            }

            if (durationPreset !== null) {
                endDate = new Date(startDate.getTime() + durationPreset * 60 * 1000);
            } else {
                endDate = new Date(document.getElementById("endTime").value);
            }

            return { startDate, endDate };
        }

        function dateToUtc(d) {
            return `${d.getUTCFullYear()}-${pad(d.getUTCMonth() + 1)}-${pad(d.getUTCDate())}T${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())}`;
        }

        // ── Form submission ──
        document.getElementById("create-listing-form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById("submit-btn");
            const listingType = document.querySelector('input[name="listingType"]:checked').value;

            let startTimeStr, endTimeStr;
            if (listingType === "AUCTION") {
                const { startDate, endDate } = getAuctionTimes();

                if (isNaN(startDate.getTime())) {
                    showAlert("danger", "Please set a valid start time.");
                    return;
                }
                if (isNaN(endDate.getTime())) {
                    showAlert("danger", "Please set a valid end time.");
                    return;
                }
                if (startDate <= new Date()) {
                    showAlert("danger", "Start time must be in the future.");
                    return;
                }
                if (endDate <= startDate) {
                    showAlert("danger", "End time must be after the start time.");
                    return;
                }

                startTimeStr = dateToUtc(startDate);
                endTimeStr = dateToUtc(endDate);
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Creating...";

            const body = {
                sellerId: CONFIG.SELLER_ID,
                title: document.getElementById("title").value.trim(),
                description: document.getElementById("description").value.trim() || null,
                imageUrl: document.getElementById("imageUrl").value.trim() || null,
                listingType: listingType,
                startPrice: parseFloat(document.getElementById("startPrice").value),
            };

            if (listingType === "AUCTION") {
                body.startTime = startTimeStr;
                body.endTime = endTimeStr;
            }

            try {
                const data = await apiFetch(`${CONFIG.LISTING_API}/listings`, {
                    method: "POST",
                    body: JSON.stringify(body),
                });

                showAlert("success",
                    `Listing created! ID: ${data.listingId} — Status: ${data.status}` +
                    (listingType === "AUCTION" ? ". Timer has been set." : "")
                );

                setTimeout(() => {
                    window.location.href = "/seller/";
                }, 2000);

            } catch (err) {
                showAlert("danger", err.message);
                submitBtn.disabled = false;
                submitBtn.textContent = "Create Listing";
            }
        });

        function showAlert(type, message) {
            document.getElementById("alert-container").innerHTML =
                `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;
        }
    </script>
</body>
</html>
